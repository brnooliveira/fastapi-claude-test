name: Claude PR Review - Open

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review-on-open:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude review on PR open/update
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          use_sticky_comment: false
          track_progress: true
          prompt: |
            Revise este Pull Request.

            Analise apenas:
            - bugs reais
            - problemas de segurança
            - exceções não tratadas
            - validação de entrada insuficiente
            - problemas de performance relevantes

            IMPORTANTE:
            - publique um comentário normal no PR ao final
            - não use comentário inline
            - se encontrar problemas, liste:
              - arquivo
              - linha
              - impacto
              - correção sugerida
            - se não encontrar problemas relevantes, publique exatamente:
              "Não encontrei problemas relevantes neste PR."

            Responda em português.
            Ignore mudanças cosméticas.
            Não aprove o PR automaticamente.
          claude_args: |
            --model claude-sonnet-4-6
