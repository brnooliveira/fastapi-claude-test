name: Claude PR Review v6

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  review-on-open:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Review on PR open/update
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            Revise o Pull Request #${{ github.event.pull_request.number }} deste repositório.

            Analise apenas:
            - Bugs reais
            - Problemas de segurança
            - Exceções não tratadas
            - Validação de entrada insuficiente
            - Problemas de performance relevantes

            Se encontrar problemas relevantes, publique um comentário resumindo:
            - arquivo
            - linha
            - impacto
            - sugestão objetiva

            Responda em português.
            Ignore mudanças cosméticas.
            Não aprove o PR automaticamente.

  review-on-comment:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Review on comment
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            Revise o Pull Request #${{ github.event.issue.number }} deste repositório.

            Analise apenas:
            - Bugs reais
            - Problemas de segurança
            - Exceções não tratadas
            - Validação de entrada insuficiente
            - Problemas de performance relevantes

            Se encontrar problemas relevantes, publique um comentário resumindo:
            - arquivo
            - linha
            - impacto
            - sugestão objetiva

            Responda em português.
            Ignore mudanças cosméticas.
            Não aprove o PR automaticamente.
