name: Claude PR Review v4

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review-on-open:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --model claude-haiku-4-5-20251001
          prompt: |
            Revise o Pull Request #${{ github.event.pull_request.number }} deste repositório.

            Passos:
            1. Execute `gh pr diff ${{ github.event.pull_request.number }}` para obter as mudanças
            2. Execute `gh pr view ${{ github.event.pull_request.number }} --json title,body,files` para contexto

            Analise o código e reporte apenas:
            - Bugs reais
            - Problemas de segurança
            - Exceções não tratadas
            - Validação de entrada insuficiente
            - Problemas de performance relevantes

            Ao finalizar, poste um comentário no PR:
            `gh pr comment ${{ github.event.pull_request.number }} --body "sua revisão aqui"`

            Regras:
            - Responda em português
            - Seja objetivo
            - Cite arquivo e linha
            - Ignore mudanças cosméticas
            - Não aprove o PR automaticamente

  review-on-comment:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --model claude-haiku-4-5-20251001
          prompt: |
            Revise o Pull Request #${{ github.event.issue.number }} deste repositório.

            Passos:
            1. Execute `gh pr diff ${{ github.event.issue.number }}` para obter as mudanças
            2. Execute `gh pr view ${{ github.event.issue.number }} --json title,body,files` para contexto

            Analise o código e reporte apenas:
            - Bugs reais
            - Problemas de segurança
            - Exceções não tratadas
            - Validação de entrada insuficiente
            - Problemas de performance relevantes

            Ao finalizar, poste um comentário no PR:
            `gh pr comment ${{ github.event.issue.number }} --body "sua revisão aqui"`

            Regras:
            - Responda em português
            - Seja objetivo
            - Cite arquivo e linha
            - Ignore mudanças cosméticas
            - Não aprove o PR automaticamente
