name: Claude PR Review - Comment

on:
  issue_comment:
    types: [created]

jobs:
  review-on-comment:
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '@claude') }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          model: claude-haiku-4-5-20251001
          mode: agent
          use_sticky_comment: false
          prompt: |
            Revise este Pull Request e publique um comentário normal no PR.

            Analise apenas:
            - bugs reais
            - problemas de segurança
            - exceções não tratadas
            - validação de entrada insuficiente
            - problemas de performance relevantes

            Se encontrar problemas, comente no PR com:
            - arquivo
            - linha
            - impacto
            - correção sugerida

            Se não encontrar nada relevante, diga explicitamente:
            "Não encontrei problemas relevantes neste PR."

            Responda em português.
            Ignore mudanças cosméticas.
